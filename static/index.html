<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telegram Spotify Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 16px; background: #0f172a; color: #e5e7eb; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    button { padding: 8px 12px; border-radius: 8px; border: none; background: #22c55e; color: #022c22; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .section { margin-bottom: 16px; padding: 12px; border-radius: 12px; background: #020617; }
    .list-item { padding: 8px; border-radius: 8px; margin-bottom: 4px; background: #020617; display: flex; justify-content: space-between; align-items: center; }
    input[type="text"] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #1f2937; background: #020617; color: #e5e7eb; }
    small { color: #9ca3af; }
  </style>
</head>
<body>
  <h1>Spotify Player Mini App</h1>
  <div id="status" class="section">
    <div id="auth-status">Проверка авторизации...</div>
    <button id="spotify-login-btn" style="margin-top:8px; display:none;">Войти через Spotify</button>
  </div>

  <div class="section">
    <h2>Плейлисты</h2>
    <div id="playlists"></div>
  </div>

  <div class="section">
    <h2>Поиск треков</h2>
    <input type="text" id="search-input" placeholder="Введите название трека..." />
    <div id="search-results" style="margin-top:8px;"></div>
  </div>

  <div class="section">
    <h2>Плеер</h2>
    <div id="current-track"><small>Нет данных о текущем треке</small></div>
    <div style="margin-top:8px;">
      <button id="prev-btn">⏮</button>
      <button id="pause-btn">⏯</button>
      <button id="next-btn">⏭</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    let tgUserId = null;

    if (tg) {
      tg.ready();
      tg.expand();
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        tgUserId = String(tg.initDataUnsafe.user.id);
      }
    }

    async function apiGet(path) {
      const url = new URL(path, window.location.origin);
      if (tgUserId) {
        url.searchParams.set("tg_user_id", tgUserId);
      }
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function apiPost(path) {
      const url = new URL(path, window.location.origin);
      if (tgUserId) {
        url.searchParams.set("tg_user_id", tgUserId);
      }
      const res = await fetch(url.toString(), { method: "POST" });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function checkAuth() {
      try {
        const data = await apiGet("/api/me");
        const statusEl = document.getElementById("auth-status");
        const btn = document.getElementById("spotify-login-btn");
        if (data.spotify_linked) {
          statusEl.textContent = "Spotify привязан ✅";
          btn.style.display = "none";
          loadPlaylists();
          loadCurrent();
        } else {
          statusEl.textContent = "Spotify не привязан";
          btn.style.display = "inline-block";
        }
      } catch (e) {
        document.getElementById("auth-status").textContent = "Ошибка: " + e.message;
      }
    }

    async function loadPlaylists() {
      try {
        const list = await apiGet("/api/playlists");
        const el = document.getElementById("playlists");
        el.innerHTML = "";
        list.forEach(p => {
          const div = document.createElement("div");
          div.className = "list-item";
          div.textContent = p.name;
          el.appendChild(div);
        });
      } catch (e) {
        document.getElementById("playlists").innerHTML = "<small>Ошибка загрузки плейлистов</small>";
      }
    }

    async function loadCurrent() {
      try {
        const cur = await apiGet("/api/player/current");
        const el = document.getElementById("current-track");
        if (cur && cur.item) {
          el.textContent = cur.item.name;
        } else {
          el.innerHTML = "<small>Сейчас ничего не играет</small>";
        }
      } catch {
        document.getElementById("current-track").innerHTML = "<small>Нет данных о текущем треке</small>";
      }
    }

    document.getElementById("spotify-login-btn").onclick = () => {
      const url = new URL("/auth/spotify/login", window.location.origin);
      if (tgUserId) {
        url.searchParams.set("tg_user_id", tgUserId);
      }
      window.open(url.toString(), "_blank");
    };

    document.getElementById("pause-btn").onclick = () => apiPost("/api/player/pause").then(loadCurrent);
    document.getElementById("next-btn").onclick = () => apiPost("/api/player/next").then(loadCurrent);
    document.getElementById("prev-btn").onclick = () => apiPost("/api/player/previous").then(loadCurrent);

    const searchInput = document.getElementById("search-input");
    let searchTimer = null;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (!q) {
        document.getElementById("search-results").innerHTML = "";
        return;
      }
      searchTimer = setTimeout(async () => {
        try {
          const res = await apiGet("/api/search?q=" + encodeURIComponent(q));
          const el = document.getElementById("search-results");
          el.innerHTML = "";
          res.forEach(t => {
            const div = document.createElement("div");
            div.className = "list-item";
            div.textContent = t.name;
            el.appendChild(div);
          });
        } catch {
          document.getElementById("search-results").innerHTML = "<small>Ошибка поиска</small>";
        }
      }, 400);
    });

    checkAuth();
  </script>
</body>
</html>
